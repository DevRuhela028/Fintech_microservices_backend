version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${USER_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-postgres}
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-postgres} -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: ${PAYMENT_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-postgres}
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER:-postgres} -d paymentdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  user-service:
    build: 
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    env_file: .env
    environment:
      SERVICE_NAME: user-service
      USER_DB_HOST: postgres-user
      USER_DB_PORT: 5432
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build: 
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    env_file: .env
    environment:
      SERVICE_NAME: payment-service
      PAYMENT_DB_HOST: postgres-payment
      PAYMENT_DB_PORT: 5432
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-payment:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: 
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    env_file: .env
    environment:
      SERVICE_NAME: notification-service
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  fraud-service:
    build: 
      context: .
      dockerfile: services/fraud-service/Dockerfile
    container_name: fraud-service
    env_file: .env
    environment:
      SERVICE_NAME: fraud-service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - payment-service
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres-user-data:
  postgres-payment-data:
  redis-data:
